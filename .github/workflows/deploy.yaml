name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: set up node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: setup git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: fetch CNAME from dist branch
        run: |
          git fetch origin dist:dist || true
          git show dist:CNAME > CNAME || echo "CNAME not found, skipping"

      - name: install dependencies
        run: npm install

      - name: build project
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_URL: /

      - name: copy CNAME to dist (if exists)
        run: |
          if [ -f CNAME ]; then
            cp CNAME dist/CNAME
          fi

      - name: copy index.html to 404.html
        run: |
          cp dist/index.html dist/404.html

      - name: deploy to dist
        run: |
          cd dist
          git init
          git checkout -b dist
          git add -A
          git commit -m "🚀 Deploy id ${GITHUB_RUN_ID}"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git
          git push -f origin dist
